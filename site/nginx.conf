server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for any path that doesn't match a file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # OntoStore SPA: all sub-routes serve the same ontostore page
    location ~* ^/ontostore/(.+)$ {
        try_files $uri /ontostore/index.html;
    }
    location ~* ^/zh/ontostore/(.+)$ {
        try_files $uri /zh/ontostore/index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
